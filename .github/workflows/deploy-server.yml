name: Deploy Server

on:
  push:
    branches:
      - main
    paths:
      # Only trigger when server-related files change
      - "server/**"
      - "lib/**"
      - "prisma/**"
      - "docker-compose.server.yml"
      - ".github/workflows/deploy-server.yml"

env:
  IMAGE: ghcr.io/nqanhtu/cm-server

jobs:
  # ── Job 1: Build image on GitHub Actions runner, push to GHCR ──────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          # Cache layers between runs — makes subsequent builds very fast
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: SSH into VPS, pull image, restart containers ────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build   # only runs after image is pushed successfully

    steps:
      - name: SSH into server and deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}  # PAT with read:packages scope
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN
          script: |
            set -e

            REPO_DIR="/opt/mono-cm"
            COMPOSE_FILE="$REPO_DIR/docker-compose.server.yml"

            # Clone repo on first deploy, pull on subsequent ones
            if [ ! -d "$REPO_DIR/.git" ]; then
              echo "First deploy — cloning repo..."
              git clone git@github.com:nqanhtu/cm.git "$REPO_DIR"
            else
              echo "Pulling latest changes..."
              cd "$REPO_DIR"
              git pull origin main
            fi

            # Login to GHCR and pull the freshly built image
            echo "$GHCR_TOKEN" | docker login ghcr.io -u nqanhtu --password-stdin
            docker pull ghcr.io/nqanhtu/cm-server:latest

            # Restart all province servers with new image (no --build, just pull)
            cd "$REPO_DIR"
            docker compose -f "$COMPOSE_FILE" up -d \
              $(docker compose -f "$COMPOSE_FILE" config --services | grep -v cm-redis)

            # Remove dangling images to save disk space
            docker image prune -f

            # NOTE: Traefik auto-detects new containers via Docker socket — no restart needed

            echo "✅ Deploy complete!"
