name: Deploy Server

on:
  push:
    branches:
      - main
    paths:
      # Only trigger when server-related files change
      - "src/**"
      - "Dockerfile"
      - "package.json"
      - "docker-compose.yml"
      - ".github/workflows/deploy-server.yml"

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: SSH into server and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            REPO_DIR="/opt/court-management-api"
            COMPOSE_FILE="$REPO_DIR/docker-compose.yml"

            # Clone repo on first deploy, pull on subsequent ones
            if [ ! -d "$REPO_DIR/.git" ]; then
              echo "First deploy — cloning repo..."
              git clone git@github.com-court:nqanhtu/court-management-api.git "$REPO_DIR"
            else
              echo "Pulling latest changes..."
              cd "$REPO_DIR"
              git reset --hard HEAD
              git pull origin main
            fi

            # Rebuild and restart only the server service
            cd "$REPO_DIR"
            docker compose -f "$COMPOSE_FILE" up -d --build cm-server

            # Remove dangling images to save disk space
            docker image prune -f

            # Restart Traefik to detect new cm-server IP and avoid 504
            echo "Restarting Traefik..."
            cd /opt/n8n
            docker compose restart traefik

            echo "✅ Deploy complete!"
